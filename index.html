<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoanHub - Smart Loan</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family: 'Segoe UI', sans-serif;
  padding-top: 70px;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(17,24,39,0.9);
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}

nav a {
  color: white;
  margin-left: 15px;
  text-decoration: none;
}

/* HERO */
.hero {
  height: 70vh;
  background: url('https://images.unsplash.com/photo-1560518883-ce09059eeffa') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero .overlay {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 10px;
  text-align: center;
  color: white;
}

.btn {
  background: #2563eb;
  color: white;
  padding: 12px 25px;
  display: inline-block;
  margin-top: 15px;
  border-radius: 5px;
  text-decoration: none;
}

/* LOAN CARDS */
#loans {
  padding: 40px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  width: 200px;
  padding: 20px;
  border-radius: 10px;
  background: #fff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

/* EMI */
#emi {
  padding: 40px 20px;
  background: linear-gradient(to right, #1e3a8a, #2563eb);
  color: white;
  text-align: center;
}

.emi-card {
  max-width: 350px;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 5px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
}

/* ANIMATION */
.fade {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.8s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 14px;
  border-radius: 50%;
}

/* FOOTER */
footer {
  background: #111827;
  color: white;
  text-align: center;
  padding: 15px;
}

/* MOBILE */
@media(max-width:768px){
  .hero {height: 60vh;}
  .card {width: 90%;}
}
</style>

</head>
<body>

<header>
  <h2>LoanHub 💸</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#loans">Loans</a>
    <a href="#emi">Calculator</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero fade">
  <div class="overlay">
    <h1>Instant Loan Approval</h1>
    <p>Fast, Easy & Secure Loans</p>
    <a href="#emi" class="btn">Check EMI</a>
  </div>
</section>

<!-- LOANS -->
<section id="loans" class="fade">
  <h2>Our Loan Services</h2>
  <div class="cards">
    <div class="card">🏠 Home Loan</div>
    <div class="card">🚗 Car Loan</div>
    <div class="card">💼 Personal Loan</div>
    <div class="card">🎓 Education Loan</div>
    <div class="card">🏢 Property Loan</div>
  </div>
</section>

<!-- EMI -->
<section id="emi" class="fade">
  <h2>EMI Calculator 💰</h2>

  <div class="emi-card">
    <input type="number" id="amount" placeholder="Loan Amount">
    <input type="number" id="rate" placeholder="Interest Rate">
    <input type="number" id="months" placeholder="Months">
    <input type="number" id="income" placeholder="Monthly Income">

    <button onclick="calculateEMI()">Calculate</button>

    <h3 id="result"></h3>
    <p id="suggestion"></p>
    <p id="score"></p>

    <canvas id="pieChart"></canvas>
  </div>
</section>

<a href="#" class="whatsapp" onclick="sendToWhatsApp()">💬</a>

<footer>
  <p>© 2026 LoanHub</p>
</footer>

<script>
// SCROLL ANIMATION
let elements = document.querySelectorAll('.fade');

window.addEventListener('scroll', () => {
  elements.forEach(el => {
    let top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});

// EMI
let chart;

function calculateEMI(){
  let P = +amount.value;
  let r = rate.value/12/100;
  let n = +months.value;
  let income = +income.value;

  let emi = (P*r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);

  result.innerText = "EMI: ₹ " + emi.toFixed(0);

  suggestion.innerText = emi > income*0.5 
    ? "⚠️ High EMI" 
    : "✅ Good Loan";

  score.innerText = "Score: " + (100-(emi/income)*100).toFixed(0);

  if(chart) chart.destroy();

  chart = new Chart(pieChart, {
    type: 'pie',
    data: {
      labels: ['Principal','Interest'],
      datasets: [{
        data: [P, (emi*n)-P],
        backgroundColor: ['green','red']
      }]
    }
  });
}

// WhatsApp
function sendToWhatsApp(){
  let url = "https://wa.me/91XXXXXXXXXX?text=I want loan";
  window.open(url);
}
</script>

</body>
</html>
